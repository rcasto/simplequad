<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simplequad — Platformer</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --border: #444;
        --text: #eee;
        --muted: #aaa;
        --muted2: #666;
        --accent: #7c4dff;
        --btn-bg: rgba(255,255,255,0.07);
        --btn-border: rgba(255,255,255,0.18);
        --btn-text: #bbb;
      }
      [data-theme="light"] {
        --bg: #f0f0f8;
        --border: #c8c8e0;
        --text: #1a1a2e;
        --muted: #666;
        --muted2: #999;
        --accent: #5c2ddf;
        --btn-bg: rgba(0,0,0,0.05);
        --btn-border: rgba(0,0,0,0.15);
        --btn-text: #555;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
        color: var(--text);
        padding: 16px;
        transition: background 0.2s, color 0.2s;
      }
      canvas {
        border: 2px solid var(--border);
        display: block;
        width: min(800px, calc(100vw - 32px));
        aspect-ratio: 800 / 500;
      }
      #hud {
        margin-top: 8px;
        font-size: 13px;
        color: var(--muted);
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      #controls {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted2);
        text-align: center;
      }
      #btn-theme {
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 4px;
        color: var(--btn-text);
        cursor: pointer;
        font-size: 14px;
        padding: 2px 7px;
        font-family: monospace;
        transition: border-color 0.15s;
      }
      #btn-theme:hover { border-color: var(--accent); }
      /* On-screen touch controls */
      #touch-controls {
        display: none;
        margin-top: 14px;
        gap: 10px;
        align-items: center;
        justify-content: center;
      }
      .touch-btn {
        width: 60px;
        height: 60px;
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        border-radius: 10px;
        color: var(--btn-text);
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #btn-jump {
        width: 80px;
        background: rgba(232, 168, 56, 0.15);
        border-color: rgba(232, 168, 56, 0.3);
        color: #e8a838;
      }
      @media (hover: none), (max-width: 600px) {
        #controls { display: none; }
        #touch-controls { display: flex; }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="hud">
      <span>objects in tree: <b id="count">0</b></span>
      <span>fps: <b id="fps">0</b></span>
      <button id="btn-theme" title="toggle theme">☀</button>
    </div>
    <div id="controls">
      Arrow keys / WASD to move &nbsp;|&nbsp; Up / W / Space to jump
    </div>
    <div id="touch-controls">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-jump">▲ Jump</button>
      <button class="touch-btn" id="btn-right">▶</button>
    </div>

    <script src="../../dist/simplequad.umd.js"></script>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const W = canvas.width,
        H = canvas.height;

      // ── world ──────────────────────────────────────────────────────────────
      const GRAVITY = 0.5;
      const PLAYER_SPEED = 4;
      const JUMP_FORCE = -11;
      const TILE = 24;

      const tree = SimpleQuad.createQuadTree({
        x: 0,
        y: 0,
        width: W,
        height: H,
      });

      const platforms = [
        // ground
        { x: 0, y: H - TILE, width: W, height: TILE, color: "#4a7c59" },
        // mid platforms
        { x: 100, y: 360, width: 160, height: TILE, color: "#4a7c59" },
        { x: 340, y: 300, width: 120, height: TILE, color: "#4a7c59" },
        { x: 540, y: 250, width: 140, height: TILE, color: "#4a7c59" },
        { x: 200, y: 210, width: 100, height: TILE, color: "#4a7c59" },
        { x: 620, y: 380, width: 130, height: TILE, color: "#4a7c59" },
        // high platforms
        { x: 50, y: 140, width: 120, height: TILE, color: "#3d6b4f" },
        { x: 660, y: 150, width: 110, height: TILE, color: "#3d6b4f" },
        { x: 350, y: 120, width: 100, height: TILE, color: "#3d6b4f" },
      ];

      const coinPositions = [
        [130, 340], [200, 340], [380, 280], [440, 280],
        [570, 230], [640, 230], [230, 190], [260, 190],
        [80, 120],  [130, 120], [380, 100], [430, 100],
        [680, 130], [720, 130], [660, 360],
      ];

      const coins = coinPositions.map(([cx, cy]) => ({
        x: cx, y: cy, width: 10, height: 10, collected: false,
      }));

      const player = {
        x: 60,
        y: H - TILE - 32,
        width: 24,
        height: 32,
        vx: 0,
        vy: 0,
        onGround: false,
        color: "#e8a838",
      };

      const themeBtn = document.getElementById("btn-theme");
      themeBtn.addEventListener("click", () => {
        const isLight = document.documentElement.getAttribute("data-theme") === "light";
        document.documentElement.setAttribute("data-theme", isLight ? "dark" : "light");
        themeBtn.textContent = isLight ? "☀" : "☾";
      });

      const keys = {};
      document.addEventListener("keydown", (e) => (keys[e.code] = true));
      document.addEventListener("keyup", (e) => (keys[e.code] = false));

      // Touch buttons set keys directly
      function addTouchBtn(id, code) {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[code] = true; }, { passive: false });
        btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[code] = false; }, { passive: false });
        btn.addEventListener("touchcancel", () => { keys[code] = false; });
      }
      addTouchBtn("btn-left", "ArrowLeft");
      addTouchBtn("btn-right", "ArrowRight");
      addTouchBtn("btn-jump", "Space");

      function isJump() {
        return keys["ArrowUp"] || keys["KeyW"] || keys["Space"];
      }

      let score = 0;
      let gameState = "playing"; // 'playing' | 'won'
      let lastTime = 0, fps = 0, frameCount = 0, fpsTime = 0;

      function resetGame() {
        score = 0;
        gameState = "playing";
        player.x = 60;
        player.y = H - TILE - 32;
        player.vx = 0;
        player.vy = 0;
        player.onGround = false;
        coins.forEach((c) => { c.collected = false; });
      }

      // Tap canvas on win screen to restart
      canvas.addEventListener("click", () => {
        if (gameState === "won") resetGame();
      });
      canvas.addEventListener("touchstart", (e) => {
        if (gameState === "won") { e.preventDefault(); resetGame(); }
      }, { passive: false });

      function update(dt) {
        if (gameState === "won") {
          if (keys["Space"] || keys["Enter"]) resetGame();
          return;
        }

        // horizontal
        if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -PLAYER_SPEED;
        else if (keys["ArrowRight"] || keys["KeyD"]) player.vx = PLAYER_SPEED;
        else player.vx = 0;

        // jump
        if (isJump() && player.onGround) {
          player.vy = JUMP_FORCE;
          player.onGround = false;
        }

        player.vy += GRAVITY;
        player.x += player.vx;
        player.y += player.vy;

        player.x = Math.max(0, Math.min(W - player.width, player.x));

        // rebuild tree each frame
        tree.clear();
        platforms.forEach((p) => tree.add(p));
        coins.filter((c) => !c.collected).forEach((c) => tree.add(c));

        const hits = tree.query(player);
        player.onGround = false;

        for (const { object, mtv } of hits) {
          if (object.collected !== undefined) {
            object.collected = true;
            score++;
            continue;
          }
          player.x += mtv.vector.x;
          player.y += mtv.vector.y;

          if (mtv.vector.y < -0.1) {
            player.vy = 0;
            player.onGround = true;
          }
          if (mtv.vector.y > 0.1 && player.vy < 0) {
            player.vy = 0;
          }
          if (Math.abs(mtv.vector.x) > 0.1) {
            player.vx = 0;
          }
        }

        // fall off bottom resets position
        if (player.y > H + 50) {
          player.x = 60;
          player.y = H - TILE - 32;
          player.vx = 0;
          player.vy = 0;
        }

        if (score === coins.length) {
          gameState = "won";
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#1a1a2e");
        bg.addColorStop(1, "#16213e");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        for (const p of platforms) {
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.width, p.height);
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.fillRect(p.x, p.y, p.width, 3);
        }

        for (const c of coins) {
          if (c.collected) continue;
          ctx.fillStyle = "#f5c518";
          ctx.beginPath();
          ctx.arc(c.x + 5, c.y + 5, 5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = "#1a1a2e";
        ctx.fillRect(player.x + 5, player.y + 8, 4, 4);
        ctx.fillRect(player.x + 15, player.y + 8, 4, 4);

        ctx.fillStyle = "#f5c518";
        ctx.font = "bold 16px monospace";
        ctx.fillText(`coins: ${score} / ${coins.length}`, 12, 24);

        if (gameState === "won") {
          ctx.fillStyle = "rgba(0,0,0,0.5)";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#f5c518";
          ctx.font = "bold 32px monospace";
          ctx.textAlign = "center";
          ctx.fillText("You collected all coins!", W / 2, H / 2);
          ctx.font = "16px monospace";
          ctx.fillStyle = "#aaa";
          ctx.fillText("Press Space or tap to play again", W / 2, H / 2 + 36);
          ctx.textAlign = "left";
        }
      }

      function loop(ts) {
        const dt = ts - lastTime;
        lastTime = ts;
        frameCount++;
        fpsTime += dt;
        if (fpsTime >= 500) {
          fps = Math.round(frameCount / (fpsTime / 1000));
          frameCount = 0;
          fpsTime = 0;
          document.getElementById("fps").textContent = fps;
          document.getElementById("count").textContent = tree.getData().length;
        }
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
