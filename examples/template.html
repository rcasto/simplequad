<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simplequad — [Title]</title>
    <link rel="stylesheet" href="../engine.css" />
    <style>
      /* ── color scheme ────────────────────────────────────────────────────── */
      :root {
        --bg: #0a0a18;
        --border: #1a1a3e;
        --text: #eee;
        --muted: #666;
        --muted2: #444;
        --accent: #7c4dff;
        --btn-border: #2a2a4a;
        --btn-text: #666;
      }
      [data-theme="light"] {
        --bg: #f0f0f8;
        --border: #c8c8e0;
        --text: #1a1a2e;
        --muted: #778;
        --muted2: #aaa;
        --accent: #5c2ddf;
        --btn-border: #c0c0d8;
        --btn-text: #555;
      }

      /* ── canvas specifics ────────────────────────────────────────────────── */
      canvas {
        cursor: none;
        aspect-ratio: 800 / 560;
        touch-action: none;
      }

      /* ── touch joystick (shown only on touch/small screens) ─────────────── */
      #touch-controls {
        display: none;
      }
      @media (hover: none), (max-width: 600px) {
        #touch-controls { display: flex; gap: 16px; }
        #controls       { display: none; }
      }
      #joystick-pad {
        position: relative;
        width: 100px; height: 100px;
        border: 2px solid var(--border);
        border-radius: 50%;
        touch-action: none;
      }
      #joystick-knob {
        position: absolute;
        top: 50%; left: 50%;
        width: 40px; height: 40px;
        border-radius: 50%;
        background: var(--accent);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      /* ── example-specific styles below ──────────────────────────────────── */
    </style>
    <script>(function(){var t=localStorage.getItem('sq-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  </head>
  <body>
    <canvas id="canvas" width="800" height="560"></canvas>
    <div id="hud">
      <span>score: <b id="score">0</b></span>
      <span>fps: <b id="fps">0</b></span>
      <button id="btn-theme" title="toggle theme">☀</button>
    </div>
    <div id="controls">wasd / arrows — move &nbsp;|&nbsp; click — action</div>
    <!-- touch controls: only visible on touch/small screens -->
    <div id="touch-controls">
      <div id="joystick-pad"><div id="joystick-knob"></div></div>
    </div>

    <script src="../../dist/simplequad.umd.js"></script>
    <script src="../engine.js"></script>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx    = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;

      const toCanvas = SQEngine.makeToCanvas(canvas, W, H);
      const fpsTick  = SQEngine.createFpsTracker(document.getElementById("fps"), canvas);
      SQEngine.initTheme();

      // Touch joystick — returns a live { dx, dy } direction object (-1..1).
      // Remove if this example has no movement input.
      const joystick = SQEngine.createTouchJoystick(
        document.getElementById("joystick-pad"),
        document.getElementById("joystick-knob")
      );

      const tree = SimpleQuad.createQuadTree({ x: 0, y: 0, width: W, height: H });

      // ── state ──────────────────────────────────────────────────────────────
      const keys  = {};
      const mouse = { x: W / 2, y: H / 2 };

      // ── input ──────────────────────────────────────────────────────────────
      document.addEventListener("keydown", e => { keys[e.code] = true; });
      document.addEventListener("keyup",   e => { keys[e.code] = false; });

      canvas.addEventListener("mousemove", e => {
        const p = toCanvas(e.clientX, e.clientY);
        mouse.x = p.x; mouse.y = p.y;
      });

      // ── update ─────────────────────────────────────────────────────────────
      function update(dt) {
        tree.clear();

        for (const entity of entities) {
          tree.add(entity);
        }

        for (const entity of entities) {
          // Move entity using keyboard or joystick input:
          //   entity.x += (keys["ArrowRight"] || joystick.dx > 0 ? 1 : 0) * speed * dt;

          // Resolve collisions:
          //   for (const { object, mtv } of tree.query(entity)) { ... }

          // Screen-wrap moving entities (remove if not needed):
          SQEngine.screenWrap(entity, W, H);
        }
      }

      // ── draw ───────────────────────────────────────────────────────────────
      function draw() {
        const isLight = document.documentElement.getAttribute("data-theme") === "light";
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = isLight ? "#f0f0f8" : "#0a0a18";
        ctx.fillRect(0, 0, W, H);

        for (const entity of entities) {
          // Draw shapes using engine helpers:
          //   SQEngine.drawBox(ctx, entity, "#7c4dff");
          //   SQEngine.drawCircle(ctx, entity, "#7c4dff");
        }
      }

      // ── loop ───────────────────────────────────────────────────────────────
      function loop(ts) {
        const dt = fpsTick(ts);
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
